; ME424 Robot — Multi-board PlatformIO project
; Build a specific board:  pio run -e main_board
; Upload a specific board: pio run -e main_board -t upload
; Monitor:                 pio device monitor -e main_board

[platformio]
default_envs = main_board

; ── Shared settings ──────────────────────────────────────────────
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_echo = yes
monitor_filters = send_on_enter, colorize
; WiFi credentials for all boards (OTA + main web UI). Escape quotes inside strings.
build_flags =
  -D WIFI_SSID=\"surgical_clanker2.4\"
  -D WIFI_PASSWORD=\"bone_saw\"

; ── Board environments ───────────────────────────────────────────

[env:main_board]
build_src_filter = -<*> +<main_board/>
upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001
board_build.filesystem = littlefs
lib_deps =
  links2004/WebSockets @ ^2.4.1
build_flags =
  ${env.build_flags}
  -D WIFI_HOSTNAME=\"me424-main\"

; Same as main_board but routes mag/vac/saw UART to the sensor ESP32 (flash sensor with merged tool GPIOs first).
[env:main_board_sensor_mosfet]
extends = env:main_board
build_flags =
  ${env.build_flags}
  -D WIFI_HOSTNAME=\"me424-main\"
  -D MOSFET_OVER_SENSOR_UART

[env:mosfet_board]
build_src_filter = -<*> +<mosfet_board/>
; USB: set the port for *this* board only (unplug other ESP32s first). List ports: pio device list
; upload_port = /dev/cu.usbserial-XXXX
; If esptool says "No serial data received": wrong port, or bootloader not running — hold BOOT,
; tap EN, release BOOT, run upload within a few seconds; or try slower: upload_speed = 115200
build_flags =
  ${env.build_flags}
  -D WIFI_HOSTNAME=\"me424-mosfet\"

[env:sensor_board]
build_src_filter = -<*> +<sensor_board/>
; upload_port = /dev/cu.usbserial-XXXX
; Tool on sensor ESP32 when main uses env main_board_sensor_mosfet: MAG=18 VAC=19 SAW_MOS=21 SAW_PWM=22, TOOL_ID_ADC=34, POT_ADC=35 (same UART as limits).
; Magnet auto-off default 30 s: override with e.g. -D MAG_AUTO_OFF_MS=45000UL
; Noisy S1–S4 switches: add -D LIMIT_MECH_DEBOUNCE_MS=100 (default 60 ms in sensor firmware)
build_flags =
  ${env.build_flags}
  -D WIFI_HOSTNAME=\"me424-sensor\"

; OTA firmware: pio run -e main_board_ota -t upload
; (main_board_ota builds the same app as main_board — no MOSFET_OVER_SENSOR_UART.)
; When tool UART is merged onto the sensor board, use instead:
;   pio run -e main_board_sensor_mosfet_ota -t upload
; OTA filesystem: pio run -e main_board_ota -t uploadfs
; If uploadfs fails mid-progress ("Error Uploading" / "Error response from device"), the board must
; unmount LittleFS during FS OTA (fixed in firmware v12.5+). Also try: same Wi‑Fi as the ESP, disable VPN,
; allow incoming TCP on your Mac firewall, or set upload_port to the ESP's numeric IP.
; Optional: force the PC's LAN IP for the data connection (replace with your Wi‑Fi address):
; upload_flags = --host_ip=192.168.1.50
; Most reliable filesystem flash is still USB: pio run -e main_board -t uploadfs
[env:main_board_ota]
extends = env:main_board
upload_protocol = espota
upload_port = me424-main.local

[env:main_board_sensor_mosfet_ota]
extends = env:main_board_sensor_mosfet
upload_protocol = espota
upload_port = me424-main.local

; OTA: requires MOSFET ESP on same Wi‑Fi with ArduinoOTA running (hostname me424-mosfet).
; If upload fails with "me424-mosfet.local Not Found", use the board's LAN IP instead:
;   upload_port = 192.168.x.x
; Or flash once over USB: pio run -e mosfet_board -t upload  (set upload_port under [env:mosfet_board])
[env:mosfet_board_ota]
extends = env:mosfet_board
upload_protocol = espota
upload_port = me424-mosfet.local

[env:sensor_board_ota]
extends = env:sensor_board
upload_protocol = espota
upload_port = me424-sensor.local

; Example sequences (paste in serial monitor):
; seq s2up 2000, s3up 2000, s4up 1000, vac on, s1cw 2000, vac off, s5cw 800, s5ccw 800, s1ccw 2000, s4down 1000, s3down 2000, s2down 2000
; par s2up 2000, s3up 2000, s4up 1000, s1cw 2000, s5cw 500