; ME424 Robot — Multi-board PlatformIO project
; Build a specific board:  pio run -e main_board
; Upload a specific board: pio run -e main_board -t upload
; Monitor:                 pio device monitor -e main_board

[platformio]
default_envs = main_board

; ── Shared settings ──────────────────────────────────────────────
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_echo = yes
monitor_filters = send_on_enter, colorize
; WiFi credentials for all boards (OTA + main web UI). Escape quotes inside strings.
build_flags =
  -D WIFI_SSID=\"surgical_clanker2.4\"
  -D WIFI_PASSWORD=\"bone_saw\"

; ── Board environments ───────────────────────────────────────────

[env:main_board]
build_src_filter = -<*> +<main_board/>
upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001
board_build.filesystem = littlefs
lib_deps =
  links2004/WebSockets @ ^2.4.1
build_flags =
  ${env.build_flags}
  -D WIFI_HOSTNAME=\"me424-main\"

[env:mosfet_board]
build_src_filter = -<*> +<mosfet_board/>
; upload_port = /dev/cu.usbserial-XXXX
build_flags =
  ${env.build_flags}
  -D WIFI_HOSTNAME=\"me424-mosfet\"

[env:sensor_board]
build_src_filter = -<*> +<sensor_board/>
; upload_port = /dev/cu.usbserial-XXXX
build_flags =
  ${env.build_flags}
  -D WIFI_HOSTNAME=\"me424-sensor\"

[env:main_board_ota]
extends = env:main_board
upload_protocol = espota
upload_port = me424-main.local

[env:mosfet_board_ota]
extends = env:mosfet_board
upload_protocol = espota
upload_port = me424-mosfet.local

[env:sensor_board_ota]
extends = env:sensor_board
upload_protocol = espota
upload_port = me424-sensor.local

; Example sequences (paste in serial monitor):
; seq s2up 2000, s3up 2000, s4up 1000, vac on, s1cw 2000, vac off, s5cw 800, s5ccw 800, s1ccw 2000, s4down 1000, s3down 2000, s2down 2000
; par s2up 2000, s3up 2000, s4up 1000, s1cw 2000, s5cw 500